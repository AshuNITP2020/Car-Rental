spring:
  application:
    name: car-rental-backend

  # Load the gitignored root .env (KEY=VALUE) as properties, so its env vars
  # back the ${...} placeholders below. `optional:` = no error if absent.
  # ../.env when run from backend/ (gradle bootRun); .env if run from the root.
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  # Connects to the Postgres container from docker-compose (host port 55432).
  # Values are overridable via env vars so they never have to be hardcoded
  # for other environments. Defaults match docker-compose.yml dev creds.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/carrental}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  # SMTP — only used when app.notifications.provider=email. Point at Mailtrap
  # (dev inbox) or Gmail; pass creds via env. Empty host = unused (log provider).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}

  # Redis: backs the search cache. Defaults match docker-compose (:6379).
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Use Redis (not the default in-memory ConcurrentMap) as the cache provider.
  cache:
    type: redis

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_GROUP_ID:car-rental}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # Cap upload size for car images (#36). The service also validates type/size.
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:6MB}

  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must NEVER change it — only verify
      # that the @Entity classes match the Flyway-built tables, and fail fast
      # on any drift.
      ddl-auto: validate
    open-in-view: false        # don't hold DB connections open during view render
    show-sql: false            # flip to true to see generated SQL during dev
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    # PostGIS already populated the public schema (spatial_ref_sys etc.), so on
    # first run Flyway baselines the existing objects, then applies V1 onward.
    baseline-on-migrate: true
    # Baseline at version 0 so our V1 migration is still applied. (The default
    # baseline version is 1, which would mark V1 as already-done and skip it.)
    baseline-version: 0

server:
  port: 8080

# JWT settings. The dev secret is fine locally but MUST be overridden in any
# real environment via JWT_SECRET (HS256 needs >= 32 bytes / 256 bits).
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-change-this-to-a-long-random-value-32b+}
    access-minutes: 15
    refresh-days: 7
  payments:
    provider: ${PAYMENTS_PROVIDER:mock}   # 'mock' (local, no keys) or 'razorpay'
    currency: INR
    webhook-secret: ${PAYMENTS_WEBHOOK_SECRET:dev-webhook-secret}   # mock webhook shared secret
    razorpay:                              # real values come from .env (gitignored)
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  cache:
    search-ttl-seconds: ${CACHE_SEARCH_TTL_SECONDS:60}   # bound staleness of cached search reads (#34)
  rate-limit:                                            # per-client API throttle (#35)
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_RPM:120}           # per user (or IP), fixed 60s window
  storage:                                               # car image object storage (#36)
    provider: ${STORAGE_PROVIDER:local}                  # 'local' (disk, default) or 's3' (S3/R2/MinIO)
    local:
      dir: ${STORAGE_LOCAL_DIR:./data/car-images}        # where images are written on disk
      base-url: ${STORAGE_LOCAL_BASE_URL:/api/media}     # app path that serves them back
    s3:                                                  # only used when provider=s3
      bucket: ${STORAGE_S3_BUCKET:}
      region: ${STORAGE_S3_REGION:auto}                  # 'auto' for R2; a real region for AWS
      endpoint: ${STORAGE_S3_ENDPOINT:}                  # R2/MinIO endpoint; empty = real AWS S3
      access-key: ${STORAGE_S3_ACCESS_KEY:}
      secret-key: ${STORAGE_S3_SECRET_KEY:}
      presign-seconds: ${STORAGE_S3_PRESIGN_SECONDS:900} # lifetime of the presigned GET url
  pricing:
    gst-percent: ${PRICING_GST_PERCENT:18}            # tax on the rental
    deposit-percent: ${PRICING_DEPOSIT_PERCENT:20}    # refundable security deposit
    platform-fee-percent: ${PRICING_PLATFORM_FEE_PERCENT:10}  # marketplace commission (payout, #25)
  cancellation:
    free-window-hours: ${CANCELLATION_FREE_WINDOW_HOURS:24}   # full rental refund if cancelled this far before start
    late-refund-percent: ${CANCELLATION_LATE_REFUND_PERCENT:50}  # else refund this % of rental (deposit always 100%)
  notifications:
    provider: ${NOTIFICATIONS_PROVIDER:log}   # 'log' (default, no setup) or 'email' (SMTP via spring.mail.*)
    email:
      from: ${NOTIFICATIONS_EMAIL_FROM:no-reply@car-rental.local}
  scheduler:
    hold-expiry-ms: ${SCHED_HOLD_EXPIRY_MS:60000}        # sweep stale holds (#30)
    auto-complete-ms: ${SCHED_AUTO_COMPLETE_MS:300000}   # auto-complete overdue rentals (#31)
    reminder-ms: ${SCHED_REMINDER_MS:300000}             # pickup reminders (#31)
    reminder-window-hours: ${SCHED_REMINDER_WINDOW_HOURS:24}
    report-cron: ${SCHED_REPORT_CRON:0 0 1 * * *}        # nightly report at 01:00 (#31)

# Actuator + Micrometer metrics (P7). Exposes the Prometheus scrape endpoint
# at /actuator/prometheus for the Prometheus container to pull.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Emit latency histogram buckets so Prometheus/Grafana can compute p95/p99
      # and track these SLO boundaries for HTTP request timings.
      percentiles-histogram:
        "[http.server.requests]": true
      slo:
        "[http.server.requests]": 50ms,100ms,200ms,500ms,1s
  # Boot 4 defaults metrics export off; turn it on for the real app. Using the
  # `defaults` key (not `prometheus.*`) is deliberate: @SpringBootTest's
  # DisableMetricsExportContextCustomizer forces this same key false via a
  # higher-precedence test property, so tests keep export OFF (avoiding multiple
  # test contexts fighting over the shared Prometheus registry) while the running
  # app has it ON. PrometheusEndpointTest re-enables it just for its own context.
  defaults:
    metrics:
      export:
        enabled: true

# Structured logging + request correlation.
#  * A CorrelationIdFilter puts a per-request `requestId` into the MDC (and echoes
#    it as the X-Request-Id header), so every log line is tied to one request and
#    the id propagates across service calls.
#  * Console stays human-readable, with [requestId] injected via the level pattern.
#  * A machine-parseable JSON copy (Elastic Common Schema) is written to a file for
#    log aggregation; MDC entries like requestId are included automatically.
logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
  structured:
    format:
      file: ecs
  file:
    name: logs/car-rental.json
