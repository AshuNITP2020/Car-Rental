spring:
  application:
    name: car-rental-backend

  # Connects to the Postgres container from docker-compose (host port 55432).
  # Values are overridable via env vars so they never have to be hardcoded
  # for other environments. Defaults match docker-compose.yml dev creds.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/carrental}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

server:
  port: 8080

# Actuator: expose health (and info) so we can prove the app is up.
# More endpoints get exposed deliberately later (metrics in P7).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
