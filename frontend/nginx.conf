# nginx config for the built SPA.
#  * Serves the static bundle and falls back to index.html for client-side routes.
#  * Reverse-proxies API + actuator traffic to the backend container, so the
#    browser only ever talks to one origin (no CORS) — the prod analogue of
#    Vite's dev proxy (vite.config.ts).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets; never cache the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: unknown paths resolve to index.html so the client router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API + media + actuator. "backend" is the compose service name.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}
