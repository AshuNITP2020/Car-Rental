# Prometheus scrape config. The Prometheus container runs with host
# networking, so it reaches the backend (run on the host via `./gradlew bootRun`)
# at localhost:8080 — bypassing the Docker bridge, which blocks container↔container
# traffic on this host. Same reason the container uses host networking, not a
# service name.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: car-rental-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8080']
