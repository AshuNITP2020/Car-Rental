# Local dev infrastructure for the Car Rental Marketplace.
#   docker compose up -d        → start Postgres + Redis in the background
#   docker compose ps           → see status / health
#   docker compose logs -f      → tail logs
#   docker compose down         → stop & remove containers (data survives in volumes)
#   docker compose down -v      → also delete the data volumes (fresh start)
#
# Credentials default to dev-only values below; override via a .env file
# (see .env.example). NEVER use these defaults in production.

services:
  postgres:
    # PostGIS image = standard Postgres + PostGIS preinstalled, and includes
    # btree_gist (needed by the booking exclusion constraint in Phase 2).
    image: postgis/postgis:16-3.4
    container_name: carrental-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carrental}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host 55432 -> container 5432. Native Postgres clusters already occupy
      # 5432/5433 on this machine, so we use a high port well clear of them.
      # The backend connects to localhost:55432.
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-carrental}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: carrental-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    # Apache Kafka in KRaft mode (no ZooKeeper) — single broker for dev.
    image: apache/kafka:3.8.0
    container_name: carrental-kafka
    ports:
      - "9092:9092"          # clients on the host connect here
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker dev: replication/min-ISR must be 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  minio:
    # S3-compatible object storage for car images (Task #36), used when the
    # backend runs with app.storage.provider=s3. Lets you exercise the real S3
    # code path locally with no AWS account. API on :9000, web console on :9001
    # (log in with the root user/password below).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: carrental-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"            # S3 API — the backend connects here
      - "${MINIO_CONSOLE_PORT:-9001}:9001"    # browser console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  createbuckets:
    # One-shot: waits for MinIO, then creates the image bucket (idempotent).
    # Exits 0 when done — it's normal to see it "Exited (0)".
    # Shares MinIO's network namespace so it reaches the server on localhost —
    # robust even where the Docker bridge blocks container-to-container traffic.
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: carrental-minio-init
    network_mode: "service:minio"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://localhost:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do echo 'waiting for minio...'; sleep 1; done &&
      mc mb --ignore-existing local/${STORAGE_S3_BUCKET:-car-images} &&
      echo 'MinIO bucket ready: ${STORAGE_S3_BUCKET:-car-images}'
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  kafkadata:
  miniodata:
